<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skincare Routine</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:system-ui;
background:#f4f6f8;
padding:20px;
max-width:500px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

li{
margin:10px 0;
font-size:16px;
}

label{
display:flex;
align-items:center;
gap:10px;
}

input[type="checkbox"]{
width:18px;
height:18px;
}

.streak{
text-align:center;
font-size:18px;
margin-bottom:15px;
}

.badge{
background:#ffe082;
padding:6px 12px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Skincare Routine</h1>

<div class="streak">
🔥 Streak: <span id="streak">0</span> days
</div>

<div class="card">
<h2>Morning</h2>
<ul id="morning"></ul>
</div>

<div class="card">
<h2>Night</h2>
<ul id="night"></ul>
</div>

<script>

const repairMorning=["Oat Cleanser","Snail Cream","Sunscreen"];
const repairNight=["Oat Cleanser","Peptide Serum","Snail Cream"];

const brightMorning=["Oat Cleanser","Golden Hour Serum","Snail Cream","Sunscreen"];
const brightNight=["Oat Cleanser","Double Shot Serum","Snail Cream"];

const normalMorning=["Oat Cleanser","Peptide Serum","Snail Cream","Sunscreen"];
const normalNight=["Oat Cleanser","Peptide Serum","Snail Cream"];

const retinolNight=["Oat Cleanser","Retinol Serum","Snail Cream"];

let today=new Date();
let day=today.getDate();
let weekday=today.getDay();

let morning=[];
let night=[];

if(day>=9 && day<=12){
morning=repairMorning;
night=repairNight;
}
else if(day>=13 && day<=17){
morning=brightMorning;
night=brightNight;
}
else{
morning=normalMorning;

if(weekday==2 || weekday==5){
night=retinolNight;
}else{
night=normalNight;
}
}

function render(list,id){
let el=document.getElementById(id);

list.forEach(step=>{
let li=document.createElement("li");

li.innerHTML=`<label>
<input type="checkbox" class="task"> ${step}
</label>`;

el.appendChild(li);
});
}

render(morning,"morning");
render(night,"night");


// streak system

let streak=localStorage.getItem("streak")||0;
let lastDate=localStorage.getItem("lastDate");

let todayStr=new Date().toDateString();

if(lastDate!==todayStr){
streak=parseInt(streak)+1;
localStorage.setItem("streak",streak);
localStorage.setItem("lastDate",todayStr);
}

document.getElementById("streak").textContent=streak;


// service worker

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
